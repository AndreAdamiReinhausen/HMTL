<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Converter Scaling</title>
  <link rel="stylesheet" href="design/theme.css">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; }

    .stage-pad { padding: var(--sp-4) var(--sp-5); }
    .header-rule { margin-bottom: var(--sp-2); }
    h1 { font-size: 34px; }
    .subline { font-size: 18px; }

    /* ---- Haupt-Layout: links IPU, rechts Tachos ---- */
    .layout {
      display: grid;
      grid-template-columns: 388px 1fr;
      gap: var(--sp-4);
      height: 560px;
    }
    .col { display: flex; flex-direction: column; min-height: 0; }
    .col > .panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }

    .col-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: var(--sp-2);
    }
    .col-head h3 { margin: 0; }

    /* ---- Steuer-Zeile (Slider + Wert) ---- */
    .control { margin-bottom: var(--sp-1); }
    .control-top {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 6px;
    }
    .control-label { font-size: 14px; color: var(--c-grau-dunkel); font-weight: 600; letter-spacing: .01em; }
    .control-value { font-size: 15px; color: var(--c-dunkelblau); font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ---- Range-Slider ---- */
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 6px; border-radius: 3px;
      background: var(--c-grau-hell); outline: none; cursor: pointer; margin: 8px 0;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--c-blau); border: 2px solid #fff; box-shadow: 0 1px 4px rgba(12,58,110,.35);
    }
    input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--c-blau); border: 2px solid #fff; box-shadow: 0 1px 4px rgba(12,58,110,.35);
    }

    /* ---- Segmented Toggle (Group Size) ---- */
    .seg { display: flex; align-items: center; gap: 10px; }
    .seg-label { font-size: 13px; color: var(--c-grau-dunkel); font-weight: 600; }
    .seg-btns { display: inline-flex; border: 1px solid var(--c-blau); border-radius: var(--radius); overflow: hidden; }
    .seg-btns button {
      font: 600 14px var(--font); border: none; background: #fff; color: var(--c-blau);
      padding: 4px 14px; cursor: pointer; transition: background .15s;
    }
    .seg-btns button + button { border-left: 1px solid var(--c-blau); }
    .seg-btns button.is-on { background: var(--c-blau); color: #fff; }

    /* ---- IPU-Grid: IGBT-Leistungsmodule ---- */
    .ipu-grid {
      --ipu-w: 68px;
      display: grid;
      grid-template-columns: repeat(2, var(--ipu-w));
      column-gap: var(--ipu-w);
      row-gap: 16px;
      justify-content: center; align-content: center;
      flex: 1; margin-top: var(--sp-1);
    }
    .ipu { line-height: 0; }
    .ipu svg {
      width: 100%; height: auto; display: block;
      filter: drop-shadow(0 2px 3px rgba(12, 58, 110, .15));
    }
    .ipu .mbody  { fill: #F4F3EE; stroke: #C4C3BC; stroke-width: 2.5; transition: fill .3s, stroke .3s; }
    .ipu .mterm  { fill: #C7C6C0; transition: fill .3s; }
    .ipu .mplate { fill: #C7C6C0; transition: fill .3s; }
    .ipu .mfin   { fill: #D2D1CB; transition: fill .3s; }
    .ipu .mgloss { fill: #FFFFFF; opacity: .5; }
    .ipu .msym   { stroke: #B9B9B9; transition: stroke .3s; }
    .ipu .msym-f { fill: #B9B9B9; transition: fill .3s; }
    .ipu .mled   { fill: #DDDCD6; transition: fill .3s; }
    .ipu.is-active .mbody  { fill: #F2F8FE; stroke: var(--c-blau); }
    .ipu.is-active .mterm  { fill: #8CA5BE; }
    .ipu.is-active .mplate { fill: #8CA5BE; }
    .ipu.is-active .mfin   { fill: #A9BDD1; }
    .ipu.is-active .msym   { stroke: var(--c-dunkelblau); }
    .ipu.is-active .msym-f { fill: var(--c-dunkelblau); }
    .ipu.is-active .mled   { fill: #7D9A29; filter: drop-shadow(0 0 3px rgba(125, 154, 41, .9)); }

    /* ---- Tachos ---- */
    .gauges {
      display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3);
      margin-top: var(--sp-2); flex: 1; align-content: center;
    }
    .gauge { display: flex; flex-direction: column; align-items: center; }
    .gauge h3 { font-size: 18px; margin: 0 0 var(--sp-1); text-align: center; }
    .gauge svg { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>

  <div class="stage" id="stage">
    <div class="stage-pad">

      <div class="header-rule">
        <h1>Converter Scaling</h1>
        <div class="subline">Adaptive Zu-/Abschaltung von IPU nach Systemlast</div>
      </div>

      <div class="layout">

        <!-- ============ LINKS: IPU ============ -->
        <div class="col">
          <div class="panel">
            <div class="col-head">
              <h3>IPUs</h3>
              <div class="seg">
                <span class="seg-label">Group Size</span>
                <div class="seg-btns" id="segGroup">
                  <button data-k="1" class="is-on">1</button>
                  <button data-k="2">2</button>
                </div>
              </div>
            </div>

            <div class="control">
              <div class="control-top">
                <span class="control-label">Anzahl IPU</span>
                <span class="control-value" id="countVal">10</span>
              </div>
              <input type="range" id="countSlider" min="1" max="10" step="1" value="10">
            </div>

            <div class="ipu-grid" id="ipuGrid"></div>
          </div>
        </div>

        <!-- ============ RECHTS: Tachos ============ -->
        <div class="col">
          <div class="panel">
            <div class="control">
              <div class="control-top">
                <span class="control-label">Gesamtsystemleistung</span>
                <span class="control-value" id="powerVal">1.00 p.u.</span>
              </div>
              <input type="range" id="powerSlider" min="0" max="1" step="0.001" value="1">
            </div>

            <div class="gauges">
              <div class="gauge">
                <h3>Gesamtsystemleistung</h3>
                <div id="gaugeL"></div>
              </div>
              <div class="gauge">
                <h3>Leistung pro IPU</h3>
                <div id="gaugeR"></div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
  /* ================= Bühne skalieren ================= */
  (function () {
    const stage = document.getElementById('stage');
    const BASE_W = 1280, BASE_H = 720;
    function fit() {
      const s = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
      stage.style.transform = 'scale(' + s + ')';
      stage.style.transformOrigin = 'center center';
    }
    window.addEventListener('resize', fit); fit();
  })();

  /* ================= ConverterScaling (Spec §9) ================= */
  class ConverterScaling {
    constructor({ nTotal, k = 1, target = 0.5, cap = 0.9, downDelayCycles = 0, upDelayCycles = 0 }) {
      this.nTotal = nTotal;
      this.k = Math.max(1, k);
      this.target = target; this.cap = cap;
      this.downDelayCycles = downDelayCycles; this.upDelayCycles = upDelayCycles;
      this.up = new Array(nTotal + 1).fill(0);
      this.down = new Array(nTotal + 1).fill(0);
      for (let n = 1; n <= nTotal; n++) {
        const half = (this.k * this.target) / n;
        this.up[n] = Math.min(this.target + half, this.cap);
        this.down[n] = this.target - half;
      }
      this.enable = new Array(nTotal).fill(true);
      this.nextDisable = 0; this.nextEnable = 0;
      this.downTimer = 0; this.upTimer = 0;
    }
    countEnabled() { return this.enable.reduce((a, b) => a + (b ? 1 : 0), 0); }
    _advance(i) { i += 1; return i >= this.nTotal ? 0 : i; }
    _disableStep() { this.enable[this.nextDisable] = false; this.nextDisable = this._advance(this.nextDisable); }
    _enableStep()  { this.enable[this.nextEnable]  = true;  this.nextEnable  = this._advance(this.nextEnable);  }
    _setAllActive() { this.enable.fill(true); this.nextDisable = 0; this.nextEnable = 0; }
    process(uprating, derating, N) {
      if (derating < 1.0) { this.downTimer = 0; this.upTimer = 0; this._setAllActive(); }
      if (N > this.k && uprating < this.down[N]) {
        this.downTimer += 1;
        if (this.downTimer > this.downDelayCycles) { this.downTimer = 0; for (let i = 0; i < this.k; i++) this._disableStep(); }
      } else { this.downTimer = 0; }
      if (N + this.k <= this.nTotal && uprating > this.up[N]) {
        this.upTimer += 1;
        if (this.upTimer > this.upDelayCycles) { this.upTimer = 0; for (let i = 0; i < this.k; i++) this._enableStep(); }
      } else { this.upTimer = 0; }
    }
  }

  function stepSim(sc, P, derating = 1.0) {
    const N = sc.countEnabled();
    const uprating = N > 0 ? (P * sc.nTotal) / N : 0;
    sc.process(uprating, derating, N);
  }

  /* Kaskade bis zum stationären Zustand (delay = 0) */
  function settle(sc, P) {
    let last = sc.enable.join('');
    for (let i = 0; i < 400; i++) {
      stepSim(sc, P);
      const now = sc.enable.join('');
      if (now === last) break;
      last = now;
    }
  }

  /* ================= State ================= */
  const state = { nTotal: 10, k: 1, P: 1.0 };
  let sim = new ConverterScaling({ nTotal: state.nTotal, k: state.k });

  function rebuild() {
    sim = new ConverterScaling({ nTotal: state.nTotal, k: state.k });
    settle(sim, state.P);
  }

  /* ================= IGBT-Leistungsmodul (eigenes Design) ================= */
  function converterSVG() {
    let fins = '';
    for (let i = 0; i < 8; i++) {
      fins += `<rect class="mfin" x="${(17 + i * 11.7).toFixed(1)}" y="76" width="5.5" height="18" rx="1.5"/>`;
    }
    return `<svg viewBox="0 0 120 100" aria-hidden="true">
      <!-- Anschlussterminals -->
      <rect class="mterm" x="26" y="5" width="14" height="10" rx="2"/>
      <rect class="mterm" x="80" y="5" width="14" height="10" rx="2"/>
      <!-- Kühlkörper: Bodenplatte + Rippen -->
      <rect class="mplate" x="14" y="68" width="92" height="6" rx="1.5"/>
      ${fins}
      <!-- Modulgehäuse -->
      <rect class="mbody" x="14" y="12" width="92" height="58" rx="7"/>
      <rect class="mgloss" x="19" y="16" width="82" height="10" rx="5"/>
      <!-- IGBT mit Freilaufdiode -->
      <g class="msym" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="3">
        <line x1="30" y1="41" x2="43" y2="41"/>
        <line x1="43" y1="30" x2="43" y2="52"/>
        <line x1="49" y1="26" x2="49" y2="56"/>
        <line x1="62" y1="20" x2="49" y2="32"/>
        <line x1="49" y1="50" x2="62" y2="62"/>
        <line x1="62" y1="20" x2="82" y2="20"/>
        <line x1="62" y1="62" x2="82" y2="62"/>
        <line x1="82" y1="20" x2="82" y2="30"/>
        <line x1="82" y1="50" x2="82" y2="62"/>
        <line x1="75" y1="30" x2="89" y2="30"/>
        <path d="M75 50 L89 50 L82 31 Z"/>
      </g>
      <polygon class="msym-f" points="61,61 53.5,58.5 57.5,53.5"/>
      <!-- Status-LED -->
      <circle class="mled" cx="97" cy="61" r="4"/>
    </svg>`;
  }

  /* ================= Tacho-Geometrie ================= */
  const el = id => document.getElementById(id);
  const clamp01 = v => Math.max(0, Math.min(1, v));
  const CX = 150, CY = 128, R = 94, TW = 15;
  // frac 0 -> 225°, frac 1 -> 495° (270°-Bogen über oben)
  const fdeg = f => 225 + clamp01(f) * 270;
  function gpt(r, frac) {
    const a = fdeg(frac) * Math.PI / 180;
    return [CX + r * Math.sin(a), CY - r * Math.cos(a)];
  }
  function garc(r, f0, f1) {
    const [x0, y0] = gpt(r, f0), [x1, y1] = gpt(r, f1);
    const large = (clamp01(f1) - clamp01(f0)) * 270 > 180 ? 1 : 0;
    return `M${x0.toFixed(1)} ${y0.toFixed(1)} A ${r} ${r} 0 ${large} 1 ${x1.toFixed(1)} ${y1.toFixed(1)}`;
  }
  function gtick(r1, r2, frac, color, w) {
    const [x1, y1] = gpt(r1, frac), [x2, y2] = gpt(r2, frac);
    return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${color}" stroke-width="${w}" stroke-linecap="round"/>`;
  }

  /* Skala: Major-Ticks alle 0.1, Minor alle 0.05, Zahlen alle 0.2 */
  function gscale() {
    let s = '';
    for (let i = 0; i <= 20; i++) {
      const f = i / 20;
      if (i % 2 === 0) {
        const strong = (i === 0 || i === 10 || i === 20);
        s += gtick(R - 11, R - 21, f, strong ? '#0C3A6E' : '#4F4F4F', strong ? 2.4 : 1.7);
      } else {
        s += gtick(R - 11, R - 16, f, '#B9B9B9', 1.2);
      }
    }
    [0, 0.2, 0.4, 0.6, 0.8, 1].forEach(f => {
      const [x, y] = gpt(R - 33, f);
      s += `<text x="${x.toFixed(1)}" y="${(y + 3.5).toFixed(1)}" text-anchor="middle" fill="#4F4F4F"
        font-size="11" font-weight="600" font-family="Segoe UI, sans-serif">${f.toFixed(1)}</text>`;
    });
    return s;
  }

  /* Zifferblatt: Lünette, Fläche, Skalenbogen */
  function gface(gradId) {
    return `
      <defs>
        <radialGradient id="${gradId}" cx="50%" cy="42%" r="70%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="72%" stop-color="#F7F6F1"/>
          <stop offset="100%" stop-color="#EDECE5"/>
        </radialGradient>
        <filter id="${gradId}-sh" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#0C3A6E" flood-opacity="0.35"/>
        </filter>
      </defs>
      <circle cx="${CX}" cy="${CY}" r="${R + 20}" fill="url(#${gradId})" stroke="#B9B9B9" stroke-width="1"/>
      <circle cx="${CX}" cy="${CY}" r="${R + 20}" fill="none" stroke="#0C3A6E" stroke-width="2.5"/>
      <circle cx="${CX}" cy="${CY}" r="${R + 14}" fill="none" stroke="#B9B9B9" stroke-width="0.75"/>
      <path d="${garc(R, 0, 1)}" fill="none" stroke="#E3E1D8" stroke-width="${TW}" stroke-linecap="round"/>`;
  }

  /* Zeiger (zeigt bei rotate 0 auf frac 0); Drehung via transform */
  function gneedle(id, color, frac, shadowId) {
    const tip = R - 14;
    return `<g id="${id}" transform="rotate(${fdeg(frac).toFixed(2)} ${CX} ${CY})" filter="url(#${shadowId})">
      <path d="M${CX} ${CY - tip} L ${CX - 4.5} ${CY + 2} L ${CX - 2} ${CY + 16} L ${CX + 2} ${CY + 16} L ${CX + 4.5} ${CY + 2} Z"
        fill="${color}"/>
      <circle cx="${CX}" cy="${CY}" r="8.5" fill="${color}"/>
      <circle cx="${CX}" cy="${CY}" r="3" fill="#FFFFFF"/>
    </g>`;
  }

  function drawGaugeL(frac) {
    el('gaugeL').innerHTML = `<svg viewBox="0 0 300 250">
      ${gface('faceL')}
      ${gscale()}
      ${gneedle('needleL', '#0C3A6E', frac, 'faceL-sh')}
    </svg>`;
  }

  function drawGaugeR(N, frac) {
    const dDown = (N > sim.k) ? sim.down[N] : 0;
    const dUp   = (N + sim.k <= sim.nTotal) ? sim.up[N] : 1.0;
    el('gaugeR').innerHTML = `<svg viewBox="0 0 300 250">
      ${gface('faceR')}
      <path d="${garc(R, dDown, dUp)}" fill="none" stroke="#038DCD" stroke-opacity="0.5" stroke-width="${TW}"/>
      ${gscale()}
      ${gtick(R - 8, R + 9, 0.5, '#0C3A6E', 3)}
      ${gtick(R - 8, R + 9, 0.9, '#4F4F4F', 2)}
      ${gneedle('needleR', '#A50303', frac, 'faceR-sh')}
    </svg>`;
  }

  /* ================= Weiche Zeiger-Animation ================= */
  const anim = { P: state.P, up: 1.0, tP: state.P, tUp: 1.0 };
  function setNeedle(id, frac) {
    const n = el(id);
    if (n) n.setAttribute('transform', `rotate(${fdeg(frac).toFixed(2)} ${CX} ${CY})`);
  }
  (function loop() {
    anim.P  += (anim.tP  - anim.P)  * 0.12;
    anim.up += (anim.tUp - anim.up) * 0.12;
    if (Math.abs(anim.tP - anim.P)   < 0.0004) anim.P  = anim.tP;
    if (Math.abs(anim.tUp - anim.up) < 0.0004) anim.up = anim.tUp;
    setNeedle('needleL', anim.P);
    setNeedle('needleR', anim.up);
    requestAnimationFrame(loop);
  })();

  /* ================= Rendering ================= */
  function render() {
    const N = sim.countEnabled();
    const uprating = N > 0 ? (state.P * sim.nTotal) / N : 0;
    anim.tP = state.P;
    anim.tUp = clamp01(uprating);

    const grid = el('ipuGrid');
    if (grid.childElementCount !== sim.nTotal) {
      grid.innerHTML = Array.from({ length: sim.nTotal },
        () => `<div class="ipu">${converterSVG()}</div>`).join('');
    }
    [...grid.children].forEach((t, i) => t.classList.toggle('is-active', !!sim.enable[i]));

    el('countVal').textContent = sim.nTotal;
    el('powerVal').textContent = state.P.toFixed(2) + ' p.u.';

    drawGaugeR(N, anim.up);   // Band ggf. neu, Zeiger an aktueller Animationsposition
  }

  /* ================= Events ================= */
  el('powerSlider').addEventListener('input', e => {
    state.P = parseFloat(e.target.value);
    settle(sim, state.P);
    render();
  });
  el('countSlider').addEventListener('input', e => {
    state.nTotal = parseInt(e.target.value, 10);
    rebuild();
    render();
  });
  document.getElementById('segGroup').addEventListener('click', e => {
    const btn = e.target.closest('button'); if (!btn) return;
    state.k = parseInt(btn.dataset.k, 10);
    [...e.currentTarget.querySelectorAll('button')].forEach(b => b.classList.toggle('is-on', b === btn));
    rebuild();
    render();
  });

  /* ================= Init ================= */
  settle(sim, state.P);
  drawGaugeL(anim.P);
  render();
  </script>
</body>
</html>
