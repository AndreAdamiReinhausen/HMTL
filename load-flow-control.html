<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Load Flow Control</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#15151a;font-family:'Segoe UI','Segoe UI',sans-serif;overflow:hidden}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #stage{position:relative;aspect-ratio:16/9;width:min(100vw,calc(100vh*16/9));height:min(100vh,calc(100vw*9/16));
         background:#ffffff;box-shadow:0 14px 60px rgba(0,0,0,.55);overflow:hidden;cursor:pointer}
  #svg{width:100%;height:100%;display:block}
  svg text{font-family:'Segoe UI',sans-serif}

  .cline{fill:none;stroke:#1565ff;stroke-opacity:.45;stroke-linecap:round;stroke-linejoin:round}
  .heads polygon{fill:#1565ff}

  .lbl-mode{font-size:42px;font-weight:700;fill:#111}
  .lbl-freq{font-size:30px;font-weight:600;fill:#c0392b}

  .tint{mix-blend-mode:lighten;opacity:0;pointer-events:none}
  .ring{fill:none;opacity:0;pointer-events:none}
  @keyframes blink{0%,100%{opacity:.10}50%{opacity:1}}
  .colico.red .tint{fill:#ff2d20;opacity:1;animation:blink .7s infinite}
  .colico.red .ring{stroke:#ff2d20;stroke-width:12;opacity:1;animation:blink .7s infinite}
  .colico.green .tint{fill:#15b138;opacity:1}
  .colico.green .ring{stroke:#15b138;stroke-width:12;opacity:1}

  .brk{transform-box:fill-box;transform-origin:center}
  @keyframes nudge{0%,100%{transform:scale(1)}50%{transform:scale(1.10)}}
  .brk.hint{animation:nudge .25s 2}

  .pwr{font-size:40px;font-weight:700;fill:#1f2937}

  #hits circle{fill:#000;opacity:0;pointer-events:all;cursor:pointer}

  #footer{position:absolute;left:0;right:0;bottom:16px;text-align:center;color:#9aa0a6;
          font-size:15px;font-family:'Segoe UI',sans-serif;pointer-events:none;transition:opacity .3s;letter-spacing:.2px}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <svg id="svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#1565ff" flood-opacity="0.45"/>
        </filter>
      </defs>

      <!-- conductors (single line diagram) -->
      <g stroke="#141414" stroke-width="6" stroke-linecap="round">
        <line x1="535" y1="290" x2="1385" y2="290"/>
        <line x1="695" y1="290" x2="695"  y2="695"/>
      </g>

      <!-- red control line (GRIDCON top -> Current Transformer top) -->
      <path id="redline" d="M400,155 L400,95 Q400,85 410,85 L1150,85 Q1160,85 1160,95 L1160,228"
            fill="none" stroke="#e23b2e" stroke-width="5" stroke-linecap="round" style="display:none"/>

      <!-- icons (non colorable) -->
      <image id="img-crane"/>
      <image id="img-cbtop" class="brk"/>
      <image id="img-cbbot" class="brk"/>
      <image id="img-ct"/>

      <!-- colorable icons -->
      <g id="grp-gridcon" class="colico">
        <g style="isolation:isolate">
          <image id="img-gridcon"/>
          <circle class="tint" cx="400" cy="290" r="141"/>
        </g>
        <circle class="ring" cx="400" cy="290" r="158"/>
      </g>
      <g id="grp-generator" class="colico">
        <g style="isolation:isolate">
          <image id="img-generator"/>
          <circle class="tint" cx="1520" cy="290" r="141"/>
        </g>
        <circle class="ring" cx="1520" cy="290" r="158"/>
      </g>

      <!-- current arrows (foreground, in front of icons): base line (thickness = %) + flowing heads -->
      <g id="arrows" filter="url(#softGlow)" pointer-events="none">
        <path id="a1line" class="cline" d="M560,250 L1358,250"/>
        <g id="a1heads" class="heads"></g>
        <path id="a2line" class="cline" d="M560,330 L655,330 L655,672"/>
        <g id="a2heads" class="heads"></g>
        <path id="a3line" class="cline" d="M1360,330 L735,330 L735,672"/>
        <g id="a3heads" class="heads"></g>
      </g>

      <!-- labels next to GRIDCON -->
      <text id="lblMode" x="400" y="505" text-anchor="middle" class="lbl-mode">Droop Control</text>
      <text id="lblFreq" x="400" y="552" text-anchor="middle" class="lbl-freq" style="display:none">Frequency Drop</text>

      <!-- node power readouts (signed %, +=source / -=sink) -->
      <text id="pwrGrid"  class="pwr" x="150"  y="302" text-anchor="middle" style="display:none"></text>
      <text id="pwrGen"   class="pwr" x="1770" y="302" text-anchor="middle" style="display:none"></text>
      <text id="pwrCrane" class="pwr" x="905"  y="824" text-anchor="middle" style="display:none"></text>

      <!-- click hit areas -->
      <g id="hits">
        <circle id="hit-gridcon" cx="400"  cy="290" r="150"/>
        <circle id="hit-cbtop"   cx="895"  cy="290" r="68"/>
        <circle id="hit-cbbot"   cx="695"  cy="470" r="68"/>
      </g>
    </svg>
    <div id="footer">GRIDCON anklicken: Modus wechseln&nbsp;&nbsp;·&nbsp;&nbsp;Leistungsschalter anklicken: schliessen&nbsp;&nbsp;·&nbsp;&nbsp;Bildschirm anklicken: weiter / zuruecksetzen&nbsp;&nbsp;·&nbsp;&nbsp;F: Vollbild&nbsp;&nbsp;·&nbsp;&nbsp;H: Hinweis</div>
  </div>
</div>

const NS='http://www.w3.org/2000/svg';
const XLINK='http://www.w3.org/1999/xlink';
const MAXW=32, HEAD='#1565ff', SPEED=175;
const byId=id=>document.getElementById(id);
const mod=(x,m)=>((x%m)+m)%m;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;

/* ---- place icon images (scaled so the drawn circle hits its target radius) ---- */
function setImg(id,href,cx,cy,drawW,targetR){
  const side=1254*(2*targetR/drawW);
  const el=byId(id);
  el.setAttribute('href',href);
  el.setAttributeNS(XLINK,'href',href);
  el.setAttribute('width',side); el.setAttribute('height',side);
  el.setAttribute('x',cx-side/2); el.setAttribute('y',cy-side/2);
  el.setAttribute('preserveAspectRatio','xMidYMid meet');
}
setImg('img-gridcon',  ICONS.gridcon,   400, 290,1120,135);
setImg('img-generator',ICONS.generator,1520, 290,1084,135);
setImg('img-crane',    ICONS.crane,     695, 810,1076,115);
setImg('img-cbtop',    ICONS.cbOpen,    895, 290,1058, 62);
setImg('img-cbbot',    ICONS.cbOpen,    695, 470,1058, 62);
setImg('img-ct',       ICONS.ct,       1160, 290,1162, 62);

/* ---- current arrow model ---- */
const C={
  a1:{line:byId('a1line'),heads:byId('a1heads')},
  a2:{line:byId('a2line'),heads:byId('a2heads')},
  a3:{line:byId('a3line'),heads:byId('a3heads')}
};
for(const k in C){const c=C[k]; c.len=c.line.getTotalLength(); c.active=false; c.pct=0; c.type='flow'; c.dir=1; c.phase=0; c.polys=[]; c.line.style.display='none'; c.heads.style.display='none';}

function buildHeads(c,n){
  c.heads.innerHTML=''; c.polys=[];
  for(let i=0;i<n;i++){
    const p=document.createElementNS(NS,'polygon');
    p.setAttribute('points','1,0 -0.95,0.72 -0.95,-0.72');
    p.setAttribute('fill',HEAD);
    c.heads.appendChild(p); c.polys.push(p);
  }
}
function setCurrent(c,opt){
  c.active=true; c.type=opt.type; c.dir=opt.dir||1; c.pct=opt.pct; c.phase=0;
  c.line.style.display=''; c.heads.style.display='';
  c.line.style.strokeWidth=(MAXW*c.pct/100)+'px';
  const n = c.type==='oscillate' ? 1 : Math.max(2, Math.round(c.len/150));
  buildHeads(c,n);
}
function clearCurrent(c){ c.active=false; c.line.style.display='none'; c.heads.style.display='none'; }
function clearAll(){ for(const k in C) clearCurrent(C[k]); }

function placeHead(c,poly,l,flip,size){
  const L=c.len; l=clamp(l,0,L);
  const p=c.line.getPointAtLength(l);
  const a=c.line.getPointAtLength(Math.max(0,l-1));
  const b=c.line.getPointAtLength(Math.min(L,l+1));
  let deg=Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI; if(flip)deg+=180;
  poly.setAttribute('transform',`translate(${p.x},${p.y}) rotate(${deg}) scale(${size})`);
}

/* ---- render loop ---- */
let last=performance.now();
function render(now){
  let dt=(now-last)/1000; if(dt>0.05)dt=0.05; last=now;
  for(const k in C){
    const c=C[k]; if(!c.active) continue;
    let W=MAXW*c.pct/100; if(W<2.4)W=2.4;
    c.line.style.strokeWidth=W+'px';
    const L=c.len;
    if(c.type==='oscillate'){
      const t=now/1000, u=(1-Math.cos(2*Math.PI*t))/2, l=u*L;
      const flip=Math.sin(2*Math.PI*t)<0, size=Math.max(20,W*1.0);
      placeHead(c,c.polys[0],l,flip,size);
    }else{
      c.phase+=SPEED*dt*c.dir;
      const n=c.polys.length, step=L/n, size=Math.max(13,W*0.85);
      for(let i=0;i<n;i++) placeHead(c,c.polys[i],mod(c.phase+i*step,L),c.dir<0,size);
    }
  }
  if(typeof updateNumbers==='function') updateNumbers();   // numbers wander continuously with arrow position
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

/* ---- state machine ---- */
let phase=0, mode='droop', topClosed=false, botClosed=false, rampTimer=null;
const lblMode=byId('lblMode'), lblFreq=byId('lblFreq'), redline=byId('redline');
const gGrid=byId('grp-gridcon'), gGen=byId('grp-generator');

function setMode(m){
  mode=m;
  lblMode.textContent = (m==='droop')?'Droop Control':'Load Flow Control';
  redline.style.display = (m==='loadflow')?'':'none';
}
function stopRamp(){ if(rampTimer){clearInterval(rampTimer); rampTimer=null;} }

function closeTop(){
  topClosed=true; phase=1;
  setImg('img-cbtop',ICONS.cbClosed,895,290,1058,62);
  if(mode==='droop') setCurrent(C.a1,{type:'oscillate',pct:20});
  else               setCurrent(C.a1,{type:'flow',dir:-1,pct:20});   // Generator -> GRIDCON, constant
  updateNumbers();
}
function closeBot(){
  botClosed=true; phase=2;                                            // pause here
  setImg('img-cbbot',ICONS.cbClosed,695,470,1058,62);
  if(mode==='droop'){
    setCurrent(C.a2,{type:'flow',dir:1,pct:90});                      // GRIDCON -> Crane
    setCurrent(C.a3,{type:'flow',dir:1,pct:10});                      // Generator -> Crane
    lblFreq.textContent='Frequency Drop'; lblFreq.setAttribute('fill','#c0392b');
  }else{
    clearCurrent(C.a1);                          // crane breaker closed -> no more Generator -> GRIDCON flow
    setCurrent(C.a2,{type:'flow',dir:1,pct:70});
    setCurrent(C.a3,{type:'flow',dir:1,pct:30});
    lblFreq.textContent='Frequency Adaptation'; lblFreq.setAttribute('fill','#1e7d34');
  }
  lblFreq.style.display='';
  updateNumbers();
}
function continueRamp(){
  phase=3;
  if(mode==='droop'){
    rampTimer=setInterval(()=>{                 // smooth: +1% every 100ms
      C.a1.pct+=1;
      if(C.a1.pct>=100){ C.a1.pct=100; stopRamp(); overload(); }
    },100);
  }else{
    rampTimer=setInterval(()=>{
      if(C.a2.pct<80) C.a2.pct+=1;
      if(C.a3.pct>20) C.a3.pct-=1;
      if(C.a2.pct>=80 && C.a3.pct<=20){ stopRamp(); success(); }
    },1000);
  }
}
function overload(){ clearAll(); gGrid.classList.add('red'); gGen.classList.add('red'); phase=4; updateNumbers(); }
function success(){ gGrid.classList.add('green'); gGen.classList.add('green'); phase=4; updateNumbers(); }

function reset(){
  stopRamp(); phase=0; topClosed=false; botClosed=false;
  setImg('img-cbtop',ICONS.cbOpen,895,290,1058,62);
  setImg('img-cbbot',ICONS.cbOpen,695,470,1058,62);
  clearAll();
  lblFreq.style.display='none';
  gGrid.classList.remove('red','green'); gGen.classList.remove('red','green');
  setMode('droop');
  updateNumbers();
}

/* ---- node power readouts (signed %, synchronous with the arrows) ---- */
function nodeNet(node){
  let net=0;
  if(C.a1.active){
    if(C.a1.type==='oscillate'){
      // continuous with arrow position: u=0 at GRIDCON, u=1 at Generator (same u as the sweep)
      const u=(1-Math.cos(2*Math.PI*performance.now()/1000))/2;
      const swing=C.a1.pct*(2*u-1);                       // -pct at GRIDCON ... +pct at Generator
      if(node==='gridcon')   net+=swing;
      if(node==='generator') net-=swing;
    }else{
      const src=(C.a1.dir<0)?'generator':'gridcon', snk=(C.a1.dir<0)?'gridcon':'generator';
      if(node===src)net+=C.a1.pct; if(node===snk)net-=C.a1.pct;
    }
  }
  if(C.a2.active){ if(node==='gridcon')net+=C.a2.pct;   if(node==='crane')net-=C.a2.pct; }   // GRIDCON -> Crane
  if(C.a3.active){ if(node==='generator')net+=C.a3.pct; if(node==='crane')net-=C.a3.pct; }   // Generator -> Crane
  return net;
}
function fmtPct(v){ v=Math.round(v); return (v>=0?'+':'')+v+'%'; }
function setPwr(id,show,val){ const e=byId(id); if(show){ e.style.display=''; e.textContent=fmtPct(val); } else { e.style.display='none'; } }
function updateNumbers(){
  setPwr('pwrGrid',  C.a1.active||C.a2.active, nodeNet('gridcon'));
  setPwr('pwrGen',   C.a1.active||C.a3.active, nodeNet('generator'));
  setPwr('pwrCrane', C.a2.active||C.a3.active, nodeNet('crane'));
}

/* ---- input ---- */
const stage=byId('stage');
function nudgeTop(){ const t=byId('img-cbtop'); t.classList.remove('hint'); void t.offsetWidth; t.classList.add('hint'); setTimeout(()=>t.classList.remove('hint'),600); }

byId('hit-gridcon').addEventListener('click',e=>{ if(phase===0){ setMode(mode==='droop'?'loadflow':'droop'); e.stopPropagation(); } });
byId('hit-cbtop').addEventListener('click',e=>{ if(phase===0){ closeTop(); e.stopPropagation(); } });
byId('hit-cbbot').addEventListener('click',e=>{
  if(phase===0){ nudgeTop(); e.stopPropagation(); }                  // can't close while top is open
  else if(phase===1 && topClosed){ closeBot(); e.stopPropagation(); }
});
stage.addEventListener('click',()=>{ if(phase===2){ continueRamp(); } else if(phase===4){ reset(); } });

/* ---- keyboard helpers ---- */
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='f'){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
  else if(k==='h'){ const f=byId('footer'); f.style.opacity = (f.style.opacity==='0'?'1':'0'); }
  else if(k==='r'){ reset(); }
});

setMode('droop');
</script>
